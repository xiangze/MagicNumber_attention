steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/lyapunov/trainer:latest'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/lyapunov/trainer:latest'

images:
  - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/lyapunov/trainer:latest'